<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/deposit.css">
    <link rel="stylesheet" href="/css/money.css">
</head>


<body>
    <div class="container text-center">
        <div class="row d-flex">
            <div class="col">
                <div class="d-flex justify-content-start p-2">
                    <button class="btn btn-icon" type="button" data-bs-toggle="offcanvas" data-bs-target="#staticBackdrop1" aria-controls="staticBackdrop1">
                        <i class="bi bi-list"></i>
                    </button>
                </div>
                <div class="offcanvas offcanvas-start" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop1" aria-labelledby="staticBackdropLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title w-100 text-center" id="staticBackdropLabel">메뉴</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body menu-grid">
                        <div class="row">
                            <div class="col menu-item">충전</div>
                            <div class="col menu-item">환전</div>
                            <div class="col menu-item">머니전환</div>
                            <div class="col menu-item">포인트전환</div>
                        </div>
                        <div class="row">
                            <div class="col menu-item">텔레 문의</div>
                            <div class="col menu-item">고객 센터</div>
                            <div class="col menu-item">이벤트</div>
                        </div>
                        <div class="row">
                            <div class="col menu-item">공지/규정</div>
                            <div class="col menu-item">출석체크</div>
                            <div class="col menu-item">정보수정</div>
                        </div>
                        <div class="card mt-2">
                            <img src="/img/원피스-텔레-고객센터.gif" class="card-img-top" alt="...">
                        </div>
                        <div class="card mt-3">
                            <img src="/img/원피스-공식채널.gif" class="card-img-top" alt="...">
                        </div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="d-flex justify-content-center p-2">
                    <img src="/img/logo.png" alt="logo" class="logo">
                </div>
            </div>
            <div class="col">
                <div class="d-flex justify-content-end p-2">
                    <button class="btn btn-icon" type="button" data-bs-toggle="offcanvas" data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
                        <i class="bi bi-person-circle"></i>
                    </button>
                </div>
                <div class="offcanvas offcanvas-end" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop" aria-labelledby="staticBackdropLabel">
                    <div class="offcanvas-header">
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                        <h5 class="offcanvas-title w-100 text-center" id="staticBackdropLabel">나의 정보</h5>
                    </div>
                    <div class="offcanvas-body">
                        <div class="d-flex flex-column user-panel text-white">

                            <div class="user-info d-flex justify-content-between align-items-center py-2">
                                <div class="nickname">닉네임</div>
                                <div class="rank">등급</div>
                            </div>

                            <div class="info-line d-flex justify-content-between py-2">
                                <div>보유머니</div>
                                <div>100,000 원</div>
                            </div>

                            <div class="info-line d-flex justify-content-between py-2">
                                <div>카지노 머니</div>
                                <div>200,000 원</div>
                            </div>

                            <div class="info-line d-flex justify-content-between py-2">
                                <div>포인트</div>
                                <div>3,000 원</div>
                            </div>

                            <div class="logout-line text-center mt-3">
                                <button class="btn btn-logout w-100">로그아웃</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 머니전환 안내 -->
        <div class="d-con-area m-auto  p-2">
            <h1 class="text-primary fw-bold">머니전환 안내</h1>
            <ol class="text-align-l text-secondary">
                <li>카지노 머니를 선택 후 금액을 전환하면 <span class="text-danger">보유 머니</span>로 전환됩니다.</li>
                <li>보유 머니를 선택 후 금액을 전환하면 <span class="text-danger">카지노 머니</span>로 전환됩니다.</li>
                <li>전환된 머니는 <span class="text-danger">즉시 계정</span>에 반영됩니다.</li>
            </ol>

            <div class="input-group w-75 m-auto">
                <!-- 드롭다운 버튼 -->
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    전환 선택
                </button>

                <!-- 드롭다운 메뉴 -->
                <ul class="dropdown-menu">
                    <li><button class="dropdown-item" type="button">카지노 머니</button></li>
                    <li><button class="dropdown-item" type="button">보유 머니</button></li>
                </ul>

                <!-- 금액 입력 -->
                <input type="text" class="form-control" id="price_input" placeholder="금액 입력">

                <!-- 전환 버튼 -->
                <button class="btn btn-outline-secondary">전환</button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/money.js"></script>
</body>

</html>
