name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /srv/onepick/site_project
            git fetch origin main
            git reset --hard origin/main
            /srv/onepick/venv/bin/python manage.py makemigrations --noinput
            /srv/onepick/venv/bin/python manage.py migrate --noinput
            /srv/onepick/venv/bin/python manage.py collectstatic --noinput --clear
            sudo systemctl restart gunicorn
            sudo systemctl reload nginx