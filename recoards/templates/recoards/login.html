{% extends "main/base.html" %}
{% load static %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static "recoards/css/login.css" %}">
{% endblock extra_css %}
{% block extra_con %}
    <div class="login-wrap">
        {% for error in messages %}<div class="error">{{ error }}</div>{% endfor %}
        <form method="post" action="{% url 'recoards:login' %}">
            {% csrf_token %}
            <div class="input">
                <label for="id">아이디</label>
                <input id="id" type="text" name="username">
            </div>
            <div class="input">
                <label for="pw">비밀번호</label>
                <input id="pw" type="password" name="password">
            </div>
            <div class="login">
                <!-- 로그인 버튼 -->
                <button type="submit" class="login-btn">로그인</button>
                <!-- 회원가입 버튼 -->
                <a class="join-btn" href="{% url 'recoards:sign_up' %}">회원가입</a>
            </div>
        </form>
        
    </div>
{% endblock extra_con %}
{% block extra_js %}
{% endblock extra_js %}
